name: MCP Server CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=moderate

      - name: Generate Evidence Pack
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/generate_evidence_pack.py --output EVIDENCE_PACK.md --strict

      - name: Upload Evidence Pack
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-pack-${{ github.run_id }}
          path: EVIDENCE_PACK.md
          if-no-files-found: error
